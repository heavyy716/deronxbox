<style>
  /* ============================================================
     THEME TOKENS — tweak the whole look from here
     ============================================================ */
  :root {
    --xbox-green: #107C10;
    --xbox-green-bright: #16C60C;
    --xbox-green-glow: rgba(22, 198, 12, 0.45);
    --bg: #0c0d0f;
    --bg-2: #101216;
    --panel: rgba(255, 255, 255, 0.035);
    --panel-2: rgba(255, 255, 255, 0.05);
    --panel-hover: rgba(22, 198, 12, 0.10);
    --border: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.14);
    --tabbar-bg: rgba(18, 20, 24, 0.86);
    --toggle-bg: rgba(255, 255, 255, 0.06);
    --text: #f4f6f5;
    --text-dim: #9aa1a3;
    --radius: 20px;
    --radius-sm: 15px;
    --font: "Segoe UI", "Segoe UI Variable", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
  }

  /* Light theme */
  body.light {
    --bg: #eef1f0;
    --bg-2: #dfe4e2;
    --panel: rgba(0, 0, 0, 0.035);
    --panel-2: rgba(0, 0, 0, 0.055);
    --panel-hover: rgba(16, 124, 16, 0.10);
    --border: rgba(0, 0, 0, 0.10);
    --border-strong: rgba(0, 0, 0, 0.16);
    --tabbar-bg: rgba(255, 255, 255, 0.86);
    --toggle-bg: rgba(0, 0, 0, 0.05);
    --text: #14170f;
    --text-dim: #566058;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Calm ambient XBOX-green glow field */
  .bg-fx {
    position: fixed;
    inset: 0;
    z-index: -2;
    background:
      radial-gradient(70% 40% at 50% -8%, rgba(22,198,12,0.20), transparent 62%),
      radial-gradient(50% 30% at 12% 8%, rgba(16,124,16,0.12), transparent 60%),
      radial-gradient(55% 34% at 92% 92%, rgba(16,124,16,0.12), transparent 60%),
      linear-gradient(180deg, var(--bg), var(--bg-2));
  }

  .wrap {
    width: 100%;
    max-width: 460px;
    padding: 26px 18px 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ============================================================
     PROFILE HEADER / IDENTITY
     ============================================================ */
  /* Profile card with banner header */
  .profile-card {
    width: 100%;
    border-radius: var(--radius);
    background: var(--panel);
    border: 1px solid var(--border);
    box-shadow: 0 10px 34px rgba(0,0,0,0.35);
    overflow: hidden;
  }
  .banner {
    position: relative;
    height: 150px;
    overflow: hidden;
    background:
      radial-gradient(120% 150% at 14% 8%, rgba(22,198,12,0.60), transparent 55%),
      radial-gradient(120% 160% at 88% 26%, rgba(16,124,16,0.55), transparent 60%),
      linear-gradient(135deg, #0b2f0b, #072207 52%, #04130a);
    background-size: cover;
    background-position: center 30%;
  }
  .banner::before {
    content: "";
    position: absolute; inset: 0;
    background: repeating-linear-gradient(115deg, rgba(255,255,255,0.06) 0 2px, transparent 2px 26px);
    opacity: 0.4;
  }
  .banner::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(12,13,15,0) 45%, rgba(12,13,15,0.55));
  }

  /* Avatar / fallback nexus overlap the banner bottom-left */
  .nexus, .avatar-ring {
    position: absolute;
    left: 20px; bottom: 18px;
    z-index: 2;
    width: 92px; height: 92px;
    border-radius: 50%;
  }
  .nexus {
    display: grid;
    place-items: center;
    background: radial-gradient(circle at 50% 42%, #fff 0 6%, #eafff0 8%, #0e0e10 9%);
    box-shadow: 0 0 0 3px var(--bg), 0 0 22px var(--xbox-green-glow);
  }
  .nexus svg { width: 62px; height: 62px; }

  .avatar-ring {
    display: none;              /* JS switches this on when an avatar exists */
    place-items: center;
    background: var(--xbox-green);
    padding: 3px;
    box-shadow: 0 0 0 3px var(--bg), 0 0 22px var(--xbox-green-glow);
  }
  .avatar {
    width: 100%; height: 100%;
    border-radius: 50%;
    object-fit: cover;
    object-position: 50% 28%;
    display: block;
  }

  .pc-id { padding: 40px 20px 16px; }
  h1 {
    font-size: 1.42rem;
    font-weight: 700;
    letter-spacing: 0.1px;
    line-height: 1.2;
  }

  /* Verified-style role badge */
  .role {
    margin-top: 10px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 11px 5px 8px;
    border-radius: 999px;
    background: linear-gradient(180deg, rgba(22,198,12,0.16), rgba(22,198,12,0.06));
    border: 1px solid rgba(22,198,12,0.34);
    color: var(--xbox-green-bright);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .role svg { width: 14px; height: 14px; }

  .handle {
    margin-top: 8px;
    color: var(--xbox-green-bright);
    font-weight: 600;
    font-size: 0.9rem;
  }
  .tagline {
    margin-top: 13px;
    color: var(--text-dim);
    font-size: 0.9rem;
    line-height: 1.55;
  }

  /* Action row: Exchange Contact + download */
  .actions {
    display: flex;
    gap: 10px;
    padding: 0 20px 20px;
  }
  .exchange {
    flex: 1;
    display: inline-flex; align-items: center; justify-content: center; gap: 9px;
    height: 50px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(180deg, var(--xbox-green-bright), var(--xbox-green));
    color: #06210a;
    font-family: var(--font);
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: 0.2px;
    cursor: pointer;
    box-shadow: 0 6px 20px var(--xbox-green-glow);
    transition: transform .15s ease, filter .15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .exchange:hover { filter: brightness(1.06); transform: translateY(-1px); }
  .exchange:active { transform: translateY(0); }
  .exchange svg { width: 20px; height: 20px; }
  .dl {
    flex: none;
    width: 50px; height: 50px;
    display: grid; place-items: center;
    border-radius: 14px;
    background: var(--panel-2);
    border: 1px solid rgba(22,198,12,0.34);
    color: var(--xbox-green-bright);
    cursor: pointer;
    transition: background .15s ease, transform .15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .dl:hover { background: var(--panel-hover); transform: translateY(-1px); }
  .dl svg { width: 20px; height: 20px; }

  /* XBOX brand mark on the banner */
  .brandmark {
    position: absolute;
    top: 12px; right: 14px;
    height: 30px; width: auto;
    z-index: 3;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.65));
  }

  /* Light/dark toggle */
  .theme-toggle {
    position: fixed;
    top: 14px; right: 14px;
    z-index: 60;
    width: 42px; height: 42px;
    display: grid; place-items: center;
    border-radius: 50%;
    background: var(--toggle-bg);
    border: 1px solid var(--border-strong);
    color: var(--text);
    cursor: pointer;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    -webkit-tap-highlight-color: transparent;
    transition: background .15s ease, transform .15s ease;
  }
  .theme-toggle:hover { transform: translateY(-1px); }
  .theme-toggle svg { width: 20px; height: 20px; }

  /* ============================================================
     FEATURED CARD (Indie Selects — latest)
     ============================================================ */
  .featured {
    width: 100%;
    margin-top: 30px;
    border-radius: var(--radius);
    padding: 20px;
    background:
      linear-gradient(140deg, rgba(22,198,12,0.18), rgba(16,124,16,0.04) 70%),
      var(--panel);
    border: 1px solid rgba(22,198,12,0.26);
    position: relative;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
  }
  .featured::after {
    content: "";
    position: absolute;
    top: -40%; right: -30%;
    width: 60%; height: 180%;
    background: radial-gradient(circle, rgba(22,198,12,0.18), transparent 70%);
    pointer-events: none;
  }
  .featured:hover {
    transform: translateY(-3px);
    border-color: rgba(22,198,12,0.55);
    box-shadow: 0 16px 46px -16px var(--xbox-green-glow);
  }
  .featured .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.68rem;
    font-weight: 800;
    letter-spacing: 1.3px;
    text-transform: uppercase;
    color: var(--xbox-green-bright);
    background: rgba(22,198,12,0.12);
    border: 1px solid rgba(22,198,12,0.3);
    padding: 5px 11px;
    border-radius: 999px;
  }
  .featured h2 { margin-top: 14px; font-size: 1.2rem; font-weight: 700; }
  .featured p  { margin-top: 5px; color: var(--text-dim); font-size: 0.9rem; line-height: 1.45; }
  .featured .go {
    margin-top: 16px;
    display: inline-flex; align-items: center; gap: 7px;
    color: var(--bg);
    background: var(--xbox-green-bright);
    font-weight: 700; font-size: 0.85rem;
    padding: 9px 16px;
    border-radius: 999px;
    box-shadow: 0 6px 20px -8px var(--xbox-green-glow);
  }
  .featured .go svg { width: 15px; height: 15px; }

  /* ============================================================
     TABBED PAGES + BOTTOM TAB BAR (Connect / Learn / Follow)
     ============================================================ */
  #pages { width: 100%; margin-top: 24px; }
  .page { display: none; flex-direction: column; gap: 11px; }
  .page.active { display: flex; animation: rise .32s ease; }
  .page-title {
    font-size: 1.06rem;
    font-weight: 800;
    letter-spacing: 0.2px;
    margin: 2px 2px 5px;
  }
  .page-title .cnt {
    color: var(--xbox-green-bright);
    font-weight: 700;
    font-size: 0.72rem;
    background: rgba(22,198,12,0.12);
    border: 1px solid rgba(22,198,12,0.28);
    border-radius: 999px;
    padding: 2px 9px;
    margin-left: 9px;
    vertical-align: middle;
  }

  .tabbar {
    position: fixed;
    left: 50%; transform: translateX(-50%);
    bottom: 14px;
    width: calc(100% - 32px);
    max-width: 424px;
    display: flex;
    gap: 4px;
    padding: 6px;
    background: var(--tabbar-bg);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--border-strong);
    border-radius: 18px;
    box-shadow: 0 12px 34px rgba(0,0,0,0.5);
    z-index: 50;
  }
  .tab {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 8px 4px;
    border: none;
    border-radius: 13px;
    background: transparent;
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.2px;
    cursor: pointer;
    transition: background .15s ease, color .15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .tab svg { width: 21px; height: 21px; }
  .tab:hover { color: var(--text); }
  .tab.active {
    background: linear-gradient(180deg, rgba(22,198,12,0.22), rgba(22,198,12,0.08));
    color: var(--xbox-green-bright);
  }

  /* ============================================================
     LINK BUTTONS (dot.-style rounded rows)
     ============================================================ */
  .links { width: 100%; display: flex; flex-direction: column; gap: 12px; }

  .link {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 13px 15px;
    border-radius: var(--radius-sm);
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    text-decoration: none;
    position: relative;
    overflow: hidden;
    transition: transform .16s ease, background .16s ease, border-color .16s ease, box-shadow .16s ease;
  }
  .link:hover {
    transform: translateY(-2px);
    background: var(--panel-hover);
    border-color: rgba(22,198,12,0.42);
    box-shadow: 0 10px 26px -16px var(--xbox-green-glow);
  }
  .link:active { transform: translateY(0) scale(0.99); }

  .link .ic {
    width: 44px; height: 44px;
    flex: 0 0 44px;
    border-radius: 13px;
    display: grid; place-items: center;
    background: rgba(255,255,255,0.055);
    border: 1px solid rgba(255,255,255,0.07);
    transition: background .16s ease, border-color .16s ease;
  }
  .link:hover .ic { background: rgba(22,198,12,0.14); border-color: rgba(22,198,12,0.3); }
  .link .ic svg { width: 23px; height: 23px; fill: currentColor; }
  .link .ic .logo-img { width: 31px; height: 31px; object-fit: contain; }
  .link .ic .emoji { font-size: 22px; line-height: 1; }
  .link .ic.xbox { background: transparent; border-color: transparent; }
  .link:hover .ic.xbox { background: transparent; border-color: transparent; }
  .link .label { display: flex; flex-direction: column; min-width: 0; }
  .link .label .t { font-weight: 650; font-size: 0.98rem; }
  .link .label .s { font-size: 0.8rem; color: var(--text-dim); margin-top: 2px; }
  .link .chev { margin-left: auto; color: var(--text-dim); flex: 0 0 auto; transition: transform .16s ease, color .16s ease; }
  .link:hover .chev { color: var(--xbox-green-bright); transform: translateX(2px); }
  .link .chev svg { width: 18px; height: 18px; }

  /* per-brand icon tints */
  .ic.xbox    { color: var(--xbox-green-bright); }
  .ic.whatsapp{ color: #25D366; }
  .ic.twitter { color: var(--text); }
  .ic.linkedin{ color: #3aa0e6; }
  .ic.discord { color: #8b9bff; }
  .ic.wechat  { color: #4ad964; }
  .ic.line    { color: #45d95a; }
  .ic.indie   { color: var(--xbox-green-bright); }
  .ic.youtube { color: #ff3d3d; }
  .ic.github  { color: #e7e9ea; }
  .ic.azure   { color: #3aa0e6; }

  footer {
    margin-top: 36px;
    color: var(--text-dim);
    font-size: 0.72rem;
    text-align: center;
    line-height: 1.6;
  }
  footer .dot { color: var(--xbox-green-bright); font-weight: 700; }
  footer .disclaimer { display: inline-block; margin-top: 6px; font-size: 0.72rem; opacity: 0.7; }

  /* entrance animation */
  .reveal { opacity: 0; transform: translateY(10px); animation: rise .5s ease forwards; }
  @keyframes rise { to { opacity: 1; transform: none; } }

  @media (prefers-reduced-motion: reduce) {
    .reveal, .nexus, .avatar-ring, .avatar { animation: none; opacity: 1; transform: none; }
  }
</style>

// Link rows

function buildLink(l) {
  const hasCopy = !l.url && l.copy;
  if (!l.url && !hasCopy) return null; // hidden (e.g. empty WeChat)
  const a = document.createElement('a');
  a.className = 'link';
  if (l.url) {
    a.href = l.url;
    a.target = '_blank';
    a.rel = 'noopener';
  } else {
    a.href = '#';
    a.addEventListener('click', (e) => {
      e.preventDefault();
      if (navigator.clipboard) navigator.clipboard.writeText(l.copy);
      const s = a.querySelector('.label .s');
      if (s) { const o = s.textContent; s.textContent = 'Copied \u2713'; setTimeout(() => s.textContent = o, 1400); }
    });
  }
  a.innerHTML =
    '<span class="ic ' + l.type + '">' + (ICONS[l.type] || ICONS.xbox) + '</span>' +
    '<span class="label"><span class="t">' + l.title + '</span>' +
      (l.subtitle ? '<span class="s">' + l.subtitle + '</span>' : '') + '</span>' +
    '<span class="chev">' + (hasCopy ? COPY_IC : CHEV) + '</span>';
  return a;
}

// Tabbed pages + bottom tab bar
const pagesEl  = document.getElementById('pages');
const tabbarEl = document.getElementById('tabbar');

const TAB_LABELS = { connect: 'Connect', learn: 'Learn', follow: 'Follow' };
const TAB_ICONS = {
  connect: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
  learn:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10L12 5 2 10l10 5 10-5z"/><path d="M6 12v5c0 1.3 2.7 2.5 6 2.5s6-1.2 6-2.5v-5"/></svg>',
  follow:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>'
};

let firstTab = true;
CONFIG.sections.forEach((sec) => {
  const links = sec.links.map(buildLink).filter(Boolean);
  if (!links.length) return;

  const page = document.createElement('section');
  page.className = 'page' + (firstTab ? ' active' : '');
  page.id = 'page-' + sec.id;
  const h = document.createElement('h2');
  h.className = 'page-title';
  h.innerHTML = sec.title + '<span class="cnt">' + links.length + '</span>';
  page.appendChild(h);
  links.forEach(a => page.appendChild(a));
  pagesEl.appendChild(page);

  const tab = document.createElement('button');
  tab.className = 'tab' + (firstTab ? ' active' : '');
  tab.type = 'button';
  tab.innerHTML = (TAB_ICONS[sec.id] || TAB_ICONS.connect) +
    '<span>' + (TAB_LABELS[sec.id] || sec.title) + '</span>';
  tab.addEventListener('click', () => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    page.classList.add('active');
    tab.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
  tabbarEl.appendChild(tab);

  firstTab = false;
});

// Exchange Contact -> download a vCard (.vcf)
function buildVCard() {
  const c = CONFIG;
  const parts = (c.name || '').trim().split(/\s+/);
  const last  = parts.length > 1 ? parts[parts.length - 1] : '';
  const first = parts.length > 1 ? parts.slice(0, -1).join(' ') : (parts[0] || '');
  const L = ['BEGIN:VCARD', 'VERSION:3.0'];
  L.push('N:' + last + ';' + first + ';;;');
  L.push('FN:' + c.name);
  L.push('ORG:XBOX \u2014 ID@XBOX');
  L.push('TITLE:ID@XBOX');
  if (c.tagline) L.push('NOTE:' + c.tagline.replace(/[\r\n,;]+/g, ' '));
  L.push('URL:' + location.href.split(/[?#]/)[0]);
  (c.sections || []).forEach(s => (s.links || []).forEach(l => { if (l.url) L.push('URL:' + l.url); }));
  if (c.avatar && c.avatar.indexOf('base64,') > -1) {
    const b64  = c.avatar.split('base64,')[1];
    const type = /jpe?g/i.test(c.avatar) ? 'JPEG' : 'PNG';
    L.push('PHOTO;ENCODING=b;TYPE=' + type + ':' + b64);
  }
  L.push('END:VCARD');
  return L.join('\r\n');
}
function downloadContact() {
  const blob = new Blob([buildVCard()], { type: 'text/vcard;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (CONFIG.name || 'contact').replace(/\s+/g, '-') + '.vcf';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
}
document.getElementById('exchange').addEventListener('click', downloadContact);
document.getElementById('dlContact').addEventListener('click', downloadContact);

// Theme (light / dark) with persistence + system default
(function () {
  const btn = document.getElementById('themeToggle');
  const SUN  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
  const MOON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
  function apply(light) {
    document.body.classList.toggle('light', light);
    btn.innerHTML = light ? MOON : SUN;
  }
  let saved = null;
  try { saved = localStorage.getItem('theme'); } catch (e) {}
  const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
  apply(saved ? saved === 'light' : !!prefersLight);
  btn.addEventListener('click', () => {
    const light = !document.body.classList.contains('light');
    apply(light);
    try { localStorage.setItem('theme', light ? 'light' : 'dark'); } catch (e) {}
  });
})();
